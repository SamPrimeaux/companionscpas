# Google powers YouTube OAuth/upload routes.
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
GOOGLE_REDIRECT_URI = "https://companionscpas-platform.meauxbility.workers.dev/api/social/oauth/youtube/callback"
