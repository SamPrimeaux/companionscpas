name = "companionscpas"
main = "src/index.js"
compatibility_date = "2025-04-01"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[vars]
APP_NAME = "Companions of CPAS"
APP_DOMAIN = "companionscpas.meauxbility.workers.dev"
ALLOWED_ORIGINS = "https://companionscpas.meauxbility.workers.dev"

# Social integrations, disabled until real app keys are added.
# Meta powers Facebook Page + Instagram Business publishing.
META_APP_ID = ""
META_APP_SECRET = ""
META_REDIRECT_URI = "https://companionscpas.meauxbility.workers.dev/api/social/oauth/meta/callback"

# Google powers YouTube OAuth/upload routes.
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
GOOGLE_REDIRECT_URI = "https://companionscpas.meauxbility.workers.dev/api/social/oauth/youtube/callback"

# Stripe + Resend integrations. Secrets are set with wrangler secret put.
ADMIN_EMAIL = "ljmusland@gmail.com"
RESEND_FROM_EMAIL = "Companions of CPAS <no-reply@companionscpas.org>"

[[d1_databases]]
binding = "DB"
database_name = "companionscpas"
database_id = "fd6dd6fb-156b-4b6a-8ff0-505422652391"

[ai]
binding = "AGENTSAM_WAI"

[triggers]
crons = ["0 6 * * *"]

[[r2_buckets]]
binding = "WEBSITE_ASSETS"
bucket_name = "companionscpas"
