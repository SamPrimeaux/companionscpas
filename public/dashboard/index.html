<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companions CPAS — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* ── Reset ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }

  /* ── CMS Theme CSS vars (overridden at runtime by cms_themes/brand) ── */
  :root {
    --brand-primary:   #8664B7;
    --brand-secondary: #7654AA;
    --brand-accent:    #F04E65;
    --brand-primary-l: #b89fd4;
    --brand-primary-dim: rgba(134,100,183,0.15);

    --dash-bg:           #f5f3f8;
    --dash-bg2:          #ede9f5;
    --dash-surface:      #ffffff;
    --dash-surface-muted:#f8f6fc;
    --dash-border:       rgba(37,29,52,0.10);
    --dash-border-strong:rgba(37,29,52,0.18);
    --dash-text:         #171320;
    --dash-text-sec:     #5a4e6e;
    --dash-text-muted:   #9b8fb0;

    --nav-bg:           #0c0a14;
    --nav-bg-glass:     rgba(12,10,20,0.94);
    --nav-border:       rgba(255,255,255,0.08);
    --nav-text:         rgba(255,255,255,0.90);
    --nav-text-sec:     rgba(255,255,255,0.55);
    --nav-text-muted:   rgba(255,255,255,0.30);
    --nav-active-bg:    linear-gradient(135deg,#7c3aed,#9b6ee7);
    --nav-active-text:  #ffffff;
    --nav-hover-bg:     rgba(255,255,255,0.06);
    --nav-group-color:  rgba(255,255,255,0.28);
    --nav-width:        224px;

    --font-ui:   'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'DM Mono', 'SF Mono', monospace;
    --ease-snap: cubic-bezier(.22,.77,.35,1);
    --ease-out:  cubic-bezier(.16,1,.3,1);
  }

  body {
    background: var(--dash-bg);
    color: var(--dash-text);
    font-family: var(--font-ui);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dash-border-strong); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--nav-bg); }

  input, select, textarea, button { font-family: var(--font-ui); }
  select option { background: #191928; color: #f0f0f5; }
  a { color: inherit; text-decoration: none; }

  .cpas-shell { display: flex; height: 100vh; overflow: hidden; }

  .cpas-sidebar {
    width: var(--nav-width);
    flex-shrink: 0;
    background: var(--nav-bg);
    border-right: 1px solid var(--nav-border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow: hidden;
    transition: width 200ms var(--ease-out);
  }

  .cpas-main-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
    background: var(--dash-bg);
  }

  #main-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .cpas-mobile-only  { display: none !important; }
  .cpas-desktop-only { display: flex !important; }

  @media (max-width: 899px) {
    .cpas-mobile-only  { display: flex !important; }
    .cpas-desktop-only { display: none !important; }
    .cpas-shell { overflow: visible; }
    .cpas-main-col { overflow: visible; }
    #main-scroll { overflow-y: visible; min-height: unset; }
    body { overflow-x: hidden; }
  }

  body.cpas-nav-open { overflow: hidden !important; }
  #root { overflow-x: hidden; }

  .cpas-drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(8,6,14,0.50);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 190;
    opacity: 0;
    pointer-events: none;
    transition: opacity 220ms ease;
  }
  .cpas-drawer-backdrop.open { opacity: 1; pointer-events: all; }

  .cpas-mobile-drawer {
    position: fixed;
    inset: 0 auto 0 0;
    width: min(82vw, 340px);
    background: var(--nav-bg-glass);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-right: 1px solid var(--nav-border);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 220ms var(--ease-snap);
    box-shadow: 4px 0 40px rgba(0,0,0,0.5);
    overflow-y: auto;
  }
  .cpas-mobile-drawer.open { transform: translateX(0); }

  .cpas-hamburger {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    gap: 4px; padding: 0 11px;
    cursor: pointer; flex-shrink: 0;
    transition: background 180ms, border-color 180ms;
  }
  .cpas-hamburger:hover { background: rgba(134,100,183,0.22); border-color: rgba(255,255,255,0.20); }
  .cpas-hamburger span { display: block; height: 1.8px; border-radius: 2px; background: rgba(255,255,255,0.75); transition: width 150ms ease; }

  .cpas-topbar {
    height: 56px;
    background: var(--nav-bg);
    border-bottom: 1px solid var(--nav-border);
    display: flex; align-items: center;
    padding: 0 24px; gap: 16px;
    position: sticky; top: 0; z-index: 100; flex-shrink: 0;
  }
  .cpas-topbar.mobile {
    height: 52px; padding: 0 12px;
    background: var(--nav-bg);
    border-bottom: 1px solid var(--nav-border);
  }

  .cpas-nav-group-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--nav-group-color);
    padding: 14px 14px 4px; white-space: nowrap;
  }

  .cpas-nav-item {
    width: 100%; display: flex; align-items: center; gap: 9px;
    padding: 8px 12px; border-radius: 7px; border: none;
    background: transparent; color: var(--nav-text-sec);
    font-size: 13px; font-weight: 400; font-family: var(--font-ui);
    cursor: pointer; transition: background 120ms, color 120ms;
    text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cpas-nav-item:hover { background: var(--nav-hover-bg); color: var(--nav-text); }
  .cpas-nav-item.active { background: var(--brand-primary-dim); color: var(--brand-primary-l); font-weight: 600; }
  .cpas-nav-item.active-parent { color: var(--nav-text); font-weight: 600; }

  .cpas-nav-children { overflow: hidden; transition: max-height 250ms var(--ease-out); max-height: 0; }
  .cpas-nav-children.open { max-height: 400px; }
  .cpas-nav-child { padding-left: 36px; font-size: 12.5px; }

  .cpas-sidebar-footer {
    padding: 14px 16px; border-top: 1px solid var(--nav-border);
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; flex-shrink: 0; transition: background 120ms;
  }
  .cpas-sidebar-footer:hover { background: var(--nav-hover-bg); }

  .cpas-loading {
    height: 100vh; background: var(--nav-bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
  }
  .cpas-loading-text { font-size: 13px; color: var(--nav-text-sec); font-family: var(--font-ui); letter-spacing: 0.02em; }

  .agentsam-launcher {
    width: 36px; height: 36px; border-radius: 9px; border: none;
    background: transparent; color: var(--nav-text-sec);
    display: grid; place-items: center; cursor: pointer; padding: 0;
    flex-shrink: 0; transition: background 120ms, color 120ms;
  }
  .agentsam-launcher:hover { background: rgba(255,255,255,0.08); color: var(--nav-text); }


  /* ── Image card text contrast ──────────────────────────── */
  .cpas-asset-label { color: rgba(255,255,255,0.92) !important; }
  .cpas-asset-meta  { color: rgba(255,255,255,0.50) !important; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
  }
</style>
</head>
