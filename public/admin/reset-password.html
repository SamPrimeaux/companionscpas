<!doctype html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reset Password</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07101a;color:white;font-family:Inter,Arial}
.card{width:min(430px,92vw);padding:34px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(18,25,36,.76);box-shadow:0 40px 110px rgba(0,0,0,.45)}
img{width:180px;display:block;margin:0 auto 30px}input,button{width:100%;padding:15px;border-radius:14px;font:inherit;margin:8px 0}
input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:white}
button{border:0;background:#6D5593;color:white;font-weight:900}.msg{margin-top:12px;color:#c4b5fd}
</style></head>
<body><main class="card">
<img src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/b82e15b1-05e1-454c-85ca-a92f8eee2100/avatar" alt="Companions of CPAS">
<h1>Reset Password</h1>
<input id="pw" type="password" placeholder="New password">
<button onclick="resetPw()">Update Password</button>
<div class="msg" id="msg"></div>
</main>
<script>
async function resetPw(){
 const token=new URLSearchParams(location.search).get('token');
 const res=await fetch('/api/auth/password/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:document.getElementById('pw').value})});
 const data=await res.json();
 document.getElementById('msg').textContent=data.message||data.error||'Done';
 if(res.ok)setTimeout(()=>location.href='/admin/login',1200);
}
</script></body></html>
