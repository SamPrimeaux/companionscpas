<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reset Password — Companions of CPAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  font-family:'DM Sans',system-ui,sans-serif;
  background:radial-gradient(ellipse at 20% 0%,rgba(124,58,237,0.15),transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(34,211,238,0.08),transparent 50%),
             #07101a;
  color:#f0ece6;
}

.card{
  width:min(420px,100%);
  background:rgba(12,16,28,0.82);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;
  box-shadow:0 40px 110px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter:blur(24px);
  overflow:hidden;
}

.card-body{padding:40px 36px 36px;}

.logo{
  height:52px;
  width:auto;
  display:block;
  margin:0 auto 32px;
  object-fit:contain;
}

.step{display:none;}
.step.active{display:block;}

h1{
  font-size:22px;
  font-weight:600;
  color:#fff;
  margin-bottom:8px;
  letter-spacing:-0.02em;
}

.subtitle{
  font-size:14px;
  color:rgba(255,255,255,0.5);
  line-height:1.6;
  margin-bottom:28px;
}

.field{
  position:relative;
  margin-bottom:14px;
}

.field input{
  width:100%;
  height:50px;
  padding:0 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  color:#f0ece6;
  font-family:inherit;
  font-size:15px;
  outline:none;
  transition:border-color 180ms,background 180ms;
}

.field input:focus{
  border-color:rgba(124,58,237,0.6);
  background:rgba(255,255,255,0.07);
}

.field input::placeholder{color:rgba(255,255,255,0.3)}

.toggle-pw{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:rgba(255,255,255,0.4);
  cursor:pointer;
  padding:4px;
  font-size:16px;
  line-height:1;
}

.strength{
  height:3px;
  border-radius:2px;
  background:rgba(255,255,255,0.08);
  margin:-8px 0 14px;
  overflow:hidden;
}

.strength-bar{
  height:100%;
  width:0%;
  border-radius:2px;
  transition:width 240ms,background 240ms;
}

.btn{
  width:100%;
  height:50px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.18);
  background:linear-gradient(135deg,rgba(160,104,255,0.92),rgba(109,58,220,0.84));
  color:#fff;
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  letter-spacing:0.04em;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(124,58,237,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform 180ms,box-shadow 180ms,opacity 180ms;
  margin-top:8px;
}

.btn:hover{transform:translateY(-1px);box-shadow:0 18px 40px rgba(124,58,237,0.4),inset 0 1px 0 rgba(255,255,255,0.26);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.msg{
  margin-top:16px;
  padding:12px 14px;
  border-radius:10px;
  font-size:13px;
  line-height:1.5;
  display:none;
}

.msg.error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
.msg.success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#86efac;}

.back-link{
  display:block;
  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:rgba(255,255,255,0.38);
  text-decoration:none;
  transition:color 150ms;
}
.back-link:hover{color:rgba(255,255,255,0.7);}

/* Success state */
.success-icon{
  width:56px;height:56px;
  border-radius:50%;
  background:rgba(34,197,94,0.12);
  border:1px solid rgba(34,197,94,0.25);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-size:24px;
}

.card-wave{
  height:6px;
  background:linear-gradient(90deg,#7c3aed,#38bdf8,#7c3aed);
  background-size:200% 100%;
  animation:wave 3s linear infinite;
}
@keyframes wave{from{background-position:0% 0%}to{background-position:200% 0%}}
</style>
</head>
<body>
<div class="card">
  <div class="card-wave"></div>
  <div class="card-body">
    <img class="logo" src="https://imagedelivery.net/g7wf09fCONpnidkRnR_5vw/9a00de35-fa41-49da-e431-a5f004cf5e00/avatar" alt="Companions of CPAS"/>

    <!-- Step 1: Request reset -->
    <div class="step active" id="step-request">
      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link. It expires in 30 minutes.</p>
      <div class="field">
        <input id="req-email" type="email" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <button class="btn" id="req-btn" onclick="requestReset()">Send Reset Link</button>
      <div class="msg" id="req-msg"></div>
      <a class="back-link" href="/admin/login">← Back to login</a>
    </div>

    <!-- Step 2: Set new password (when token in URL) -->
    <div class="step" id="step-reset">
      <h1>Set new password</h1>
      <p class="subtitle">Choose a strong password with at least 8 characters.</p>
      <div class="field">
        <input id="pw1" type="password" placeholder="New password" oninput="checkStrength()"/>
        <button class="toggle-pw" type="button" onclick="togglePw('pw1',this)">&#9679;</button>
      </div>
      <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
      <div class="field">
        <input id="pw2" type="password" placeholder="Confirm password"/>
        <button class="toggle-pw" type="button" onclick="togglePw('pw2',this)">&#9679;</button>
      </div>
      <button class="btn" id="reset-btn" onclick="doReset()">Update Password</button>
      <div class="msg" id="reset-msg"></div>
    </div>

    <!-- Step 3: Done -->
    <div class="step" id="step-done">
      <div class="success-icon">&#10003;</div>
      <h1 style="text-align:center">Password updated</h1>
      <p class="subtitle" style="text-align:center;margin-top:8px">You can now log in with your new password.</p>
      <a class="btn" href="/admin/login" style="display:flex;align-items:center;justify-content:center;text-decoration:none;margin-top:24px">Go to Login</a>
    </div>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;
  el.className='msg '+type;
  el.style.display='block';
}

function togglePw(id,btn){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'show':'hide';
}

function checkStrength(){
  const pw=document.getElementById('pw1').value;
  const bar=document.getElementById('strength-bar');
  let score=0;
  if(pw.length>=8)score++;
  if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const pct=[0,25,45,65,85,100][score];
  const colors=['','#ef4444','#f97316','#eab308','#22c55e','#22c55e'];
  bar.style.width=pct+'%';
  bar.style.background=colors[score]||'#ef4444';
}

async function requestReset(){
  const email=document.getElementById('req-email').value.trim();
  if(!email)return showMsg('req-msg','Please enter your email.','error');
  const btn=document.getElementById('req-btn');
  btn.disabled=true;btn.textContent='Sending…';
  const res=await fetch('/api/auth/password/request',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  }).catch(()=>({ok:false}));
  btn.disabled=false;btn.textContent='Send Reset Link';
  if(res.ok){
    showMsg('req-msg','Check your email for a reset link. It expires in 30 minutes.','success');
  } else {
    showMsg('req-msg','Something went wrong. Please try again.','error');
  }
}

async function doReset(){
  const pw1=document.getElementById('pw1').value;
  const pw2=document.getElementById('pw2').value;
  if(pw1.length<8)return showMsg('reset-msg','Password must be at least 8 characters.','error');
  if(pw1!==pw2)return showMsg('reset-msg','Passwords do not match.','error');
  const token=new URLSearchParams(location.search).get('token');
  if(!token)return showMsg('reset-msg','Invalid reset link.','error');
  const btn=document.getElementById('reset-btn');
  btn.disabled=true;btn.textContent='Updating…';
  const res=await fetch('/api/auth/password/reset',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token,password:pw1})
  });
  const data=await res.json().catch(()=>({}));
  btn.disabled=false;btn.textContent='Update Password';
  if(res.ok){show('step-done');}
  else{showMsg('reset-msg',data.error||'Reset failed. Link may have expired.','error');}
}

// Auto-detect: if token in URL show reset step, else show request step
if(new URLSearchParams(location.search).get('token')){show('step-reset');}
</script>
</body>
</html>
